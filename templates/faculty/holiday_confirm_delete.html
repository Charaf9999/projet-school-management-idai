{% extends 'base.html' %}
{% block title %}Supprimer congé{% endblock %}
{% block topbar_title %}Suppression{% endblock %}
{% block content %}
<div class="confirm-card">
    <span class="eyebrow">Suppression</span>
    <h2>Supprimer ce congé ?</h2>
    <p>La date supprimée ne sera plus visible dans la liste des congés.</p>
    <form method="post" class="mt-4">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger btn-pill">Supprimer</button>
        <a href="{% url 'faculty:holiday_list' %}" class="btn btn-outline-secondary btn-pill">Annuler</a>
    </form>
</div>
{% endblock %}
