{% extends 'base.html' %}
{% block title %}Supprimer emploi du temps{% endblock %}
{% block topbar_title %}Suppression{% endblock %}
{% block content %}
<div class="confirm-card">
    <span class="eyebrow">Suppression</span>
    <h2>Supprimer cette séance ?</h2>
    <p>L'horaire choisi sera retiré de la liste des emplois du temps.</p>
    <form method="post" class="mt-4">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger btn-pill">Supprimer</button>
        <a href="{% url 'faculty:timetable_list' %}" class="btn btn-outline-secondary btn-pill">Annuler</a>
    </form>
</div>
{% endblock %}
