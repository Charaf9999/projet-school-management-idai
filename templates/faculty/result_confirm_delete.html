{% extends 'base.html' %}
{% block title %}Supprimer résultat{% endblock %}
{% block topbar_title %}Suppression{% endblock %}
{% block content %}
<div class="confirm-card">
    <span class="eyebrow">Suppression</span>
    <h2>Supprimer ce résultat ?</h2>
    <p>La note sera retirée de la liste des résultats enregistrés.</p>
    <form method="post" class="mt-4">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger btn-pill">Supprimer</button>
        <a href="{% url 'faculty:result_list' %}" class="btn btn-outline-secondary btn-pill">Annuler</a>
    </form>
</div>
{% endblock %}
