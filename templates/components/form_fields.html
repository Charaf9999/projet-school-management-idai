{% if form.non_field_errors %}
    <div class="alert alert-danger py-2">{{ form.non_field_errors }}</div>
{% endif %}
<div class="row g-3">
    {% for field in form %}
        <div class="col-md-6 {% if field.name == 'address' or field.name == 'description' or field.name == 'notes' or field.name == 'remarks' %}col-12{% endif %}">
            <label for="{{ field.id_for_label }}" class="form-label fw-semibold">{{ field.label }}</label>
            {{ field }}
            {% if field.help_text %}<div class="form-help">{{ field.help_text }}</div>{% endif %}
            {% for error in field.errors %}<div class="field-error">{{ error }}</div>{% endfor %}
        </div>
    {% endfor %}
</div>
