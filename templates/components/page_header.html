<div class="page-header-card mb-4">
    <div>
        <span class="eyebrow">{{ eyebrow|default:'Gestion scolaire' }}</span>
        <h1 class="page-heading mb-2">{{ title }}</h1>
        {% if subtitle %}<p class="page-subtitle mb-0">{{ subtitle }}</p>{% endif %}
    </div>
    {% if action_url and action_label %}
        <a href="{{ action_url }}" class="btn btn-primary btn-pill shadow-sm">{{ action_label }}</a>
    {% endif %}
</div>
